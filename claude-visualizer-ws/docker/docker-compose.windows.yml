name: claude_visualizer

# Hardware mode for Windows (Docker Desktop + WSL2).
# Bridge network + published ports so the UI reaches the Windows browser.
#
# Usage: docker compose -f docker-compose.windows.yml up
#
# Note: if the UI loads but charts stay empty (no encoder data), the cross-engine
# DDS link (FastDDS agent <-> CycloneDDS nodes) may have failed over bridge network.
# Fallback: install Docker Engine natively inside WSL2 and use docker-compose.yml instead.

services:
  micro_ros_agent:
    image: microros/micro-ros-agent:jazzy
    command: serial --dev ${SERIAL_PORT:-/dev/ttyACM0} -b 115200 -v4
    devices:
      - "${SERIAL_PORT:-/dev/ttyACM0}:${SERIAL_PORT:-/dev/ttyACM0}"
    networks:
      - ros_net
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    restart: unless-stopped

  ros_nodes:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: claude_visualizer:latest
    networks:
      - ros_net
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - CYCLONEDDS_URI=file:///ros2_ws/docker/cyclone_bridge.xml
    ports:
      - "8000:8000"
      - "9090:9090"
    restart: unless-stopped

networks:
  ros_net:
    driver: bridge
